name: Build & Deploy to Arvan

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Arvan Registry
        run: echo "${{ secrets.ARVAN_REGISTRY_PASSWORD }}" | docker login ${{ secrets.ARVAN_REGISTRY_URL }} -u "${{ secrets.ARVAN_REGISTRY_USER }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_BASE_URL="${{ secrets.NEXT_PUBLIC_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_APP_NAME="${{ secrets.NEXT_PUBLIC_APP_NAME }}" \
            -t ${{ secrets.ARVAN_REGISTRY_URL }}/zendegi:latest \
            -t ${{ secrets.ARVAN_REGISTRY_URL }}/zendegi:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ${{ secrets.ARVAN_REGISTRY_URL }}/zendegi:latest
          docker push ${{ secrets.ARVAN_REGISTRY_URL }}/zendegi:${{ github.sha }}
