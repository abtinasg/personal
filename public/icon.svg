<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="یک‌درصد">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5b87a"/>
      <stop offset="0.55" stop-color="#f5956b"/>
      <stop offset="1" stop-color="#e8724a"/>
    </linearGradient>
  </defs>
  <!-- full-bleed warm background so the icon also works as "maskable" -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- soft area under the growth curve -->
  <path d="M75 376 C 162 363 209 312 252 243 C 292 179 337 122 433 94 L 433 408 L 75 408 Z" fill="#ffffff" opacity="0.14"/>
  <!-- منحنیِ رشدِ مرکب: «هر روز یک‌درصد» -->
  <g fill="none" stroke="#ffffff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
    <path d="M75 376 C 162 363 209 312 252 243 C 292 179 337 122 433 94"/>
    <path d="M333 85 H440 V192"/>
  </g>
  <!-- نقاطِ روزانه که بزرگ‌تر می‌شوند (مرکب‌شدن) -->
  <g fill="#ffffff">
    <circle cx="137" cy="365" r="22"/>
    <circle cx="252" cy="243" r="28"/>
    <circle cx="433" cy="94" r="36"/>
  </g>
</svg>
