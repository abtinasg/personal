<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="یک‌درصد">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6a8bff"/>
      <stop offset="0.55" stop-color="#8267f2"/>
      <stop offset="1" stop-color="#a96ff0"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so the icon works as "maskable" too -->
  <rect width="512" height="512" fill="url(#g)"/>
  <!-- ascending bars: compound growth, content kept inside the maskable safe zone -->
  <g fill="#ffffff">
    <rect x="150" y="300" width="58" height="84"  rx="20" opacity="0.65"/>
    <rect x="227" y="252" width="58" height="132" rx="20" opacity="0.82"/>
    <rect x="304" y="190" width="58" height="194" rx="20"/>
  </g>
  <!-- rising arrow: +1% every day -->
  <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 256 L243 198 L333 150"/>
  </g>
  <path d="M300 132 L356 128 L344 184 Z" fill="#ffffff"/>
</svg>
